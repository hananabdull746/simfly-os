# Fly.io Configuration for SimFly OS
# Usage: fly deploy

app = "simfly-os"
primary_region = "sin"  # Singapore (closest to Pakistan)
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

# Internal port mapping
[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

# Health check to keep alive
[[services.http_checks]]
  interval = 30000
  grace_period = "10s"
  method = "get"
  path = "/"
  protocol = "http"
  timeout = 5000
  tls_skip_verify = false

# Persistent storage for WhatsApp session
[mounts]
  source = "simfly_data"
  destination = "/app/.wwebjs_auth"
