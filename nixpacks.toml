[phases.setup]
nixPkgs = ['nodejs_18']
aptPkgs = [
  'chromium',
  'chromium-driver',
  'libnss3',
  'libatk1.0-0',
  'libatk-bridge2.0-0',
  'libcups2',
  'libdrm2',
  'libxcomposite1',
  'libxdamage1',
  'libxrandr2',
  'libxss1',
  'libxtst6',
  'libgbm1',
  'libasound2',
  'fonts-liberation',
  'libappindicator3-1'
]

[phases.build]
cmds = ['npm install']

[start]
cmd = 'node src/index.js'

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = 'true'
